name: Integration — Docker, MLflow & API

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  mlflow-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements-api.txt

      - name: Validar carga desde DagsHub (Model Registry)
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python -c "
          import mlflow, os
          mlflow.set_tracking_uri(os.getenv('MLFLOW_TRACKING_URI'))
          model = mlflow.sklearn.load_model('models:/CustomerChurn/latest')
          print(f'✅ Modelo cargado desde DagsHub: {type(model).__name__}')
          "

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API
        run: docker build -f Dockerfile -t churn-api:latest .

      - name: Build Streamlit
        run: docker build -f Dockerfile.streamlit -t churn-streamlit:latest .

      - name: Validar docker-compose
        run: docker compose config > /dev/null

  integration-tests:
    runs-on: ubuntu-latest
    needs: [mlflow-validation, docker-build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Levantar stack completo
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: docker compose up -d --build

      - name: Esperar healthcheck de API
        run: |
          echo "⏳ Esperando API (max 60s)..."
          for i in {1..30}; do
            docker inspect --format='{{.State.Health.Status}}' churn_api 2>/dev/null | grep -q "healthy" && echo "✅ API healthy" && exit 0
            sleep 2
          done
          echo "❌ API no llegó a healthy"
          docker compose logs api --tail=50
          exit 1

      - name: Test endpoints
        run: |
          echo "🔍 Health check:"
          curl -sf http://localhost:8000/health || curl -sf http://localhost:8000/
          echo "🔍 OpenAPI docs:"
          curl -sf http://localhost:8000/docs > /dev/null && echo "✅ Docs OK"

      - name: Setup Python para tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar deps de test
        run: |
          pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install pytest httpx requests

      - name: Ejecutar tests de API y modelo
        env:
          API_BASE_URL: "http://localhost:8000"
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          pytest tests/test_api.py tests/test_modelo.py -v --tb=short

      - name: Verificar Streamlit
        run: |
          curl -sf http://localhost:8501 || echo "⚠️ Streamlit no responde en / (puede ser normal)"

      - name: Logs si falló
        if: failure()
        run: docker compose logs --tail=100

      - name: Limpiar contenedores
        if: always()
        run: docker compose down -v